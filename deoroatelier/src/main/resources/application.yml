### ATENÇÃO ----------> JUSTIFICA-SE A PRESENTE CONFIGURAÇÃO POR SE
### TRATAR APENAS DE UM AMBIENTE DE DESENVOLVIMENTO E TESTES
server:
  port: 8011
  servlet:
    context-path: /api

spring:
  application:
    name: deoroatelier
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: jdbc:mysql://${DB_URL}:${DB_PORT}/${DB_NAME}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${USER_NAME}
    password: ${PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  jackson:
    serialization:
      fail-on-empty-beans: false
    date-format: dd-MM-yyyy

logging:
  level:
    pt.ipp.estg.doa: DEBUG
    org.springframework.web: INFO
    org.hibernate: INFO

    ### ----> SWAGGER <----------

springdoc:
  api-docs:
    path: /api-docs # URL da documentação JSON
  swagger-ui:
    path: /swagger-ui.html # URL da interface visual
    operations-sorter: method # Ordemar endpoints por métodos HTTP
    display-request-duration: true # Mostrar duração dos pedidos