version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: doa-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password_123
      MYSQL_DATABASE: doa_db_store
      MYSQL_USER: doa_db_user
      MYSQL_PASSWORD: doa_password_123
    ports:
      - "33060:3306"
    volumes:
      - doa-mysql-data:/var/lib/mysql
      - ./src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 10
    networks:
      - doa-network

volumes:
  doa-mysql-data:
    name: doa-mysql-data

networks:
  doa-network:
    name: doa-network